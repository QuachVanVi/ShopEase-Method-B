spring.application.name=marketplace

spring.datasource.url=jdbc:postgresql://localhost:5432/shopease_db
spring.datasource.username=postgres
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Wait for DB connection
spring.datasource.initialization-mode=always

# Vibe Coding Defaults (do not harden yet)
server.port=8080

# JWT Configuration
shopease.jwt.secret=fed0912384901238490123849012384901238490123849012384901238490123
shopease.jwt.expirationMs=3600000

# OAuth2 Configuration
# Set these as environment variables or in a local application-local.properties (gitignored)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
